<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Binding of Isaac: Wrath of the Lamb</title>
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
    }

    #game-frame {
      position: fixed;
      top: 0;
      left: 0;
      width: 900px;
      height: 600px;
      border: none;
      transform-origin: top left;
    }
  </style>
</head>
<body>

  <iframe
    id="game-frame"
    src="https://archive.org/embed/the-binding-of-isaac_202111&autoplay=1"
    allowfullscreen
    allow="fullscreen; autoplay"
    loading="eager"
    title="The Binding of Isaac: Wrath of the Lamb"
  ></iframe>

  <script>
    const frame = document.getElementById('game-frame');
    const GAME_W = 900;
    const GAME_H = 600;

    function scaleToFill() {
      const vw = window.innerWidth;
      const vh = window.innerHeight;

      // Cover: scale up so no black bars on either axis
      const scale = Math.max(vw / GAME_W, vh / GAME_H);

      // Offset so the scaled iframe is perfectly centered
      const x = (vw - GAME_W * scale) / 2;
      const y = (vh - GAME_H * scale) / 2;

      frame.style.transform = `translate(${x}px, ${y}px) scale(${scale})`;
    }

    scaleToFill();
    window.addEventListener('resize', scaleToFill);
  </script>

</body>
</html>
