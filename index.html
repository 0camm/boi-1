<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta http-equiv="x-ua-compatible" content="ie=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>classroom</title>

  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      overscroll-behavior: none;
      touch-action: none;
    }

    body {
      display: grid;
      place-items: center;
    }

    #flash-container {
      position: relative;
      background: #000;
      overflow: hidden;
      contain: layout paint size;
      transform: translateZ(0);
      backface-visibility: hidden;
    }

    ruffle-player {
      display: block;
      width: 100%;
      height: 100%;
      background: #000;
    }
  </style>

  <script src="https://cdn.jsdelivr.net/npm/@ruffle-rs/ruffle@0.2.0-nightly.2025.10.2/ruffle.min.js"></script>
</head>
<body>
  <div id="flash-container"></div>

  <script>
    (function () {
      const container = document.getElementById("flash-container");
      const swfUrl = "https://cdn.jsdelivr.net/gh/RobiFet/CMinterview@a4017231eca9f2173ad7ec0e63b01e4786b4ad6b/web/src/BiWrath.swf";
      const aspectRatio = 5.5 / 3;

      let player = null;
      let resizeQueued = false;

      function resizeGame() {
        resizeQueued = false;

        const ww = window.innerWidth || document.documentElement.clientWidth || 0;
        const wh = window.innerHeight || document.documentElement.clientHeight || 0;

        let width = ww;
        let height = Math.round(width / aspectRatio);

        if (height > wh) {
          height = wh;
          width = Math.round(height * aspectRatio);
        }

        container.style.width = width + "px";
        container.style.height = height + "px";
      }

      function scheduleResize() {
        if (resizeQueued) return;
        resizeQueued = true;
        requestAnimationFrame(resizeGame);
      }

      function initRuffle() {
        const ruffle = window.RufflePlayer && (window.RufflePlayer.newest?.() || window.RufflePlayer.createPlayer?.());

        if (!ruffle) {
          container.textContent = "Ruffle failed to load.";
          return;
        }

        player = ruffle.createPlayer();
        player.style.width = "100%";
        player.style.height = "100%";
        player.style.display = "block";
        player.style.background = "#000";

        container.innerHTML = "";
        container.appendChild(player);
        player.load(swfUrl);
      }

      window.addEventListener("resize", scheduleResize, { passive: true });
      window.addEventListener("orientationchange", scheduleResize, { passive: true });

      resizeGame();
      initRuffle();
    })();
  </script>
</body>
</html>
