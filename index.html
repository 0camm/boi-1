<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Game</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
    }

    ruffle-player {
      display: block;
      width: 100vw !important;
      height: 100vh !important;
    }

    #canvas {
      width: 100vw !important;
      height: 100vh !important;
    }
  </style>
  <script src="https://unpkg.com/@ruffle-rs/ruffle"></script>
</head>
<body>
  <ruffle-player id="canvas" style="width:100vw;height:100vh;" width="560" height="384"></ruffle-player>

  <script>
    window.addEventListener("load", () => {
      const player = document.getElementById("canvas");

      // Put your real SWF path here:
      player.setAttribute("src", "./game.swf");

      // Try to keep it fullscreen
      player.style.width = "100vw";
      player.style.height = "100vh";
    });
  </script>
</body>
</html>
